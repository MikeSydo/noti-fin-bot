name: CI (Lint, Test, Build)

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master ]

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      db: ${{ steps.filter.outputs.db }}
      services: ${{ steps.filter.outputs.services }}
      handlers: ${{ steps.filter.outputs.handlers }}
      global: ${{ steps.filter.outputs.global }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            db:
              - 'models/**'
              - 'db.py'
              - 'alembic/**'
              - 'tests/db/**'
            services:
              - 'services/**'
              - 'tests/services/**'
            handlers:
              - 'app/**'
              - 'bot.py'
              - 'webapp.py'
              - 'tests/handlers/**'
            global:
              - 'requirements.txt'
              - 'config.py'
              - 'main.py'
              - 'Dockerfile'
              - 'docker-compose.yml'
              - '.github/workflows/ci.yml'
              - 'tests/conftest.py'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Lint with ruff
        run: ruff check .

  test:
    needs: [filter, lint]
    # Run if global changed, or if any specific category changed
    if: |
      needs.filter.outputs.global == 'true' ||
      needs.filter.outputs.db == 'true' ||
      needs.filter.outputs.services == 'true' ||
      needs.filter.outputs.handlers == 'true'
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: notion_finance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/notion_finance_test
          ENV: test
          TELEGRAM_BOT_TOKEN: "123:abc"
          GEMINI_API_KEY: "dummy"
          FERNET_KEY: "rURsBpUenqgT3iCG-mm-YQWeGl0kSDioPF146rjPhho="
          NOTION_CLIENT_ID: "dummy"
          NOTION_CLIENT_SECRET: "dummy"
          NOTION_REDIRECT_URI: "http://localhost:8080/auth/callback"
          RELEASE_NOTES_URL: "https://example.com"
          AWS_REGION: "us-east-1"
          AWS_S3_BUCKET_NAME: "test-bucket"
          AWS_ACCESS_KEY_ID: "dummy"
          AWS_SECRET_ACCESS_KEY: "dummy"
        run: |
          if [ "${{ needs.filter.outputs.global }}" == "true" ]; then
            echo "Global changes detected. Running all tests..."
            pytest tests/ -v
          else
            TEST_PATHS=""
            if [ "${{ needs.filter.outputs.db }}" == "true" ]; then TEST_PATHS="$TEST_PATHS tests/db/"; fi
            if [ "${{ needs.filter.outputs.services }}" == "true" ]; then TEST_PATHS="$TEST_PATHS tests/services/"; fi
            if [ "${{ needs.filter.outputs.handlers }}" == "true" ]; then TEST_PATHS="$TEST_PATHS tests/handlers/"; fi
            
            echo "Running selective tests: $TEST_PATHS"
            pytest $TEST_PATHS -v
          fi

  build-and-push:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/notion-finance-bot:latest
            ${{ secrets.DOCKER_USERNAME }}/notion-finance-bot:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
