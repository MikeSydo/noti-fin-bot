name: CI (Lint, Test, Build)

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  pull-requests: read
  packages: write

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      db: ${{ steps.filter.outputs.db }}
      db_files: ${{ steps.filter.outputs.db_files }}
      services: ${{ steps.filter.outputs.services }}
      services_files: ${{ steps.filter.outputs.services_files }}
      handlers: ${{ steps.filter.outputs.handlers }}
      handlers_files: ${{ steps.filter.outputs.handlers_files }}
      global: ${{ steps.filter.outputs.global }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: shell
          filters: |
            db:
              - 'models/**'
              - 'db.py'
              - 'alembic/**'
              - 'tests/db/**'
            services:
              - 'services/**'
              - 'tests/services/**'
            handlers:
              - 'app/**'
              - 'bot.py'
              - 'webapp.py'
              - 'tests/handlers/**'
            global:
              - 'requirements.txt'
              - 'config.py'
              - 'main.py'
              - 'Dockerfile'
              - 'docker-compose.yml'
              - '.github/workflows/ci.yml'
              - 'tests/conftest.py'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Lint with ruff
        run: ruff check .

  test:
    needs: [filter, lint]
    if: |
      needs.filter.outputs.global == 'true' ||
      needs.filter.outputs.db == 'true' ||
      needs.filter.outputs.services == 'true' ||
      needs.filter.outputs.handlers == 'true'
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: noti_fin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/noti_fin_test
          ENV: test
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_DEV }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_DEV }}
          FERNET_KEY: ${{ secrets.FERNET_KEY_DEV }}
          NOTION_CLIENT_ID: ${{ secrets.NOTION_CLIENT_ID_DEV }}
          NOTION_CLIENT_SECRET: ${{ secrets.NOTION_CLIENT_SECRET_DEV }}
          NOTION_REDIRECT_URI: ${{ vars.NOTION_REDIRECT_URI }}
          RELEASE_NOTES_URL: ${{ vars.RELEASE_NOTES_URL }}
          AWS_REGION: ${{ vars.AWS_REGION_DEV }}
          AWS_S3_BUCKET_NAME: ${{ vars.AWS_S3_BUCKET_NAME_DEV }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PYTHONPATH: .
        run: |
          if [ "${{ needs.filter.outputs.global }}" == "true" ]; then
            echo "Global changes detected. Running all tests..."
            python -m pytest tests/ -v
          else
            TEST_PATHS=""
            if [ "${{ needs.filter.outputs.db }}" == "true" ]; then TEST_PATHS="$TEST_PATHS tests/db/"; fi
            if [ "${{ needs.filter.outputs.services }}" == "true" ]; then TEST_PATHS="$TEST_PATHS tests/services/"; fi
            if [ "${{ needs.filter.outputs.handlers }}" == "true" ]; then TEST_PATHS="$TEST_PATHS tests/handlers/"; fi
            
            if [ -z "$TEST_PATHS" ]; then
              echo "No selective tests found, skipping."
            else
              echo "Running selective tests: $TEST_PATHS"
              python -m pytest $TEST_PATHS -v
            fi
          fi

  build-and-push:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        run: |
          echo "DOCKER_IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.DOCKER_IMAGE_NAME }}:latest
            ghcr.io/${{ env.DOCKER_IMAGE_NAME }}:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
